<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link CSS -->
    <link rel="stylesheet" href="./style.css" />
    <!-- Link font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Nexcent</title>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a href="/" class="logo">
          <img src="./images/logo.png" alt="Nexcent logo" />
        </a>
        <nav>
          <a href="">Home</a>
          <a href="">Services</a>
          <a href="">Features</a>
          <a href="">Product</a>
          <a href="">Testimonial</a>
          <a href="">FAQ</a>
        </nav>
        <div class="action-group">
          <a href="" class="login-link">Login</a>
          <a href="" class="green-btn">Signup</a>
        </div>
      </div>
    </header>
    <!-- Banner Section -->
    <section class="banner">
      <div class="lessons">
        <h1>
          Lessons and insights <br />
          <span>from 8 years</span>
        </h1>
        <p>
          Where to grow your business as a photographer: site or social media?
        </p>
        <button>Register</button>
      </div>
      <div class="logo-lesson">
        <a href="/" class="logo-lesson">
          <img src="./images/logo_lesson.png" alt="" />
        </a>
      </div>
    </section>
    <!-- Banner Section -->

    <!-- Our Client Section -->
    <section class="client">
      <div class="our-client">
        <h1 class="title">Our Clients</h1>
        <br />
        <p class="title-client">
          We have been working with some Fortune 500+ clients
        </p>
      </div>
    </section>
    <!-- Our Client Section -->

    <!-- System Section -->
    <section class="system"></section>
    <!-- System Section -->

    <!-- Unlock Section -->
    <section class="unlock"></section>
    <!-- Unlock Section -->

    <!-- Achievement Section -->
    <section class="achievement"></section>
    <!-- Achievement Section -->

    <!-- Customers Section -->
    <section class="customers"></section>
    <!-- Customers Section -->

    <!-- Community Section -->
    <section class="community"></section>
    <!-- Community Section -->

    <footer></footer>
  </body>
</html>
